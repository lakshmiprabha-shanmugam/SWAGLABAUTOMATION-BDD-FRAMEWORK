name: Cucumber BDD Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java + Maven ────────────────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # ── Chrome ──────────────────────────────────────────────────────────────
      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      # ── Run tests ───────────────────────────────────────────────────────────
      - name: Run Cucumber BDD Tests
        run: mvn test -Dbrowser=chrome
        env:
          CI: true

      # ── Allure: generate HTML from raw results ───────────────────────────────
      - name: Generate Allure Report
        if: always()
        run: mvn allure:report --no-transfer-progress

      # ── Upload: Allure HTML report ───────────────────────────────────────────
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: target/allure-report/

      # ── Upload: Cucumber HTML report ─────────────────────────────────────────
      - name: Upload Cucumber HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-html-report
          path: target/cucumber-reports/cucumber.html

      # ── Upload: Cucumber JSON report ─────────────────────────────────────────
      - name: Upload Cucumber JSON Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-json-report
          path: target/cucumber-reports/cucumber.json

      # ── Upload: Extent Spark HTML report ────────────────────────────────────
      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report
          path: target/extent-reports/

      # ── Upload: TestNG Surefire HTML report ──────────────────────────────────
      - name: Upload TestNG Surefire Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: testng-surefire-report
          path: target/surefire-reports/
